<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="format-detection" content="telephone=no" />
  <title>Provence Trip — Offline iPhone Planner</title>
  <style>
    :root {
      --bg: #f7f7f5;
      --card: #ffffff;
      --text: #111111;
      --muted: #666;
      --border: #dedede;
      --accent: #0a84ff;
      --accent2: #34c759;
      --danger: #ff3b30;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    body { font-size: 16px; line-height: 1.45; padding-bottom: 92px; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 999;
      background: rgba(255,255,255,.95);
      backdrop-filter: blur(6px);
      border-bottom: 1px solid var(--border);
      padding: 10px 12px;
      display: grid;
      gap: 8px;
    }
    .top-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .title { font-weight: 700; font-size: 17px; }
    .subtle { color: var(--muted); font-size: 13px; }

    .quick-actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    button, .btn-link {
      min-height: 44px;
      border: 0;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      padding: 0 10px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    button.secondary, .btn-link.secondary { background: #2f2f31; }
    button.success, .btn-link.success { background: var(--accent2); }
    button.warn { background: var(--danger); }

    .wrap { padding: 12px; display: grid; gap: 12px; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
    }
    .card h2, .card h3 { margin: 0 0 8px; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .small { font-size: 14px; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; }

    details { border-top: 1px dashed var(--border); padding-top: 10px; margin-top: 10px; }
    summary { cursor: pointer; font-weight: 600; }

    .stop { border: 1px solid var(--border); border-radius: 12px; padding: 10px; margin-top: 10px; }
    .stop h4 { margin: 0 0 6px; }

    .footer-note {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      background: #fff;
      border-top: 1px solid var(--border);
      padding: 8px 10px;
      font-size: 13px;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 430px) {
      .quick-actions { grid-template-columns: 1fr; }
      .grid2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header class="topbar" aria-label="Quick controls">
    <div class="top-row">
      <div>
        <div class="title" id="currentDayLabel">Day 1 — Luberon Villages</div>
        <div class="subtle" id="nextStopLabel">Next: Gordes village center</div>
      </div>
      <button class="secondary" onclick="toggleToday()" aria-label="Toggle only today view">Today</button>
    </div>
    <div class="quick-actions">
      <button onclick="openNavCurrent()">Navigate</button>
      <button class="success" onclick="openParkCurrent()">Park</button>
      <button class="secondary" onclick="copyCurrentAddress()">Copy Address</button>
    </div>
  </header>

  <main class="wrap" id="app"></main>

  <div class="footer-note">Offline-ready single file • Open from Files in Edge • Tap actions launch Apple Maps</div>

  <script>
    const TRIP = {
      tripName: 'Provence Trip (May 28 to Jun 2, 2026)',
      tripBase: 'Luberon',
      startDate: '2026-05-28',
      endDate: '2026-06-02',
      lodging: {
        name: 'Base Lodging',
        address: 'Gargas, Provence, France',
        phone: '+33 XX XX XX XX XX',
        bookingRef: 'ABC123'
      },
      emergency: {
        emergency: '112',
        pharmacy: 'Pharmacie de Apt',
        urgentCare: 'Centre Hospitalier d\'Apt'
      },
      markets: [
        {
          name: 'Apt Saturday Market',
          town: 'Apt',
          dayOfWeek: 6, // Saturday (JS: Sun=0...Sat=6)
          priority: 'must',
          address: 'Place de la Bouquerie, Apt, France',
          notes: 'Large regional market; arrive early for parking.'
        },
        {
          name: 'L\'Isle-sur-la-Sorgue Sunday Market',
          town: 'L\'Isle-sur-la-Sorgue',
          dayOfWeek: 0, // Sunday
          priority: 'must',
          address: 'Centre-ville, L\'Isle-sur-la-Sorgue, France',
          notes: 'Excellent antiques + food; can get crowded by late morning.'
        },
        {
          name: 'Gordes Market',
          town: 'Gordes',
          dayOfWeek: 2, // Tuesday
          priority: 'optional',
          address: 'Place du Château, Gordes, France',
          notes: 'Smaller scenic market, pair with village walk.'
        }
      ],
      days: [
        {
          day: 1,
          date: '2026-05-28',
          title: 'Luberon Villages',
          arrivalTarget: '08:30',
          parkingPlan: 'Parking du Château (Gordes)',
          duration: 'Full day',
          planB: 'If Gordes is crowded, go Sénanque first',
          stops: [
            {
              name: 'Gordes Village Center',
              address: 'Place de l\'Église, 84220 Gordes, France',
              parking: 'Parking du Château, Gordes, France',
              arrivalWindow: '08:30–10:30',
              stayMin: 90,
              notes: 'Best photos in morning light.'
            },
            {
              name: 'Abbaye Notre-Dame de Sénanque',
              address: 'Abbaye de Sénanque, 84220 Gordes, France',
              parking: 'Parking Abbaye de Sénanque, Gordes, France',
              arrivalWindow: '10:45–12:00',
              stayMin: 60,
              notes: 'Check access restrictions for drone use.'
            }
          ]
        },
        {
          day: 2,
          date: '2026-05-29',
          title: 'Roussillon + Markets',
          arrivalTarget: '09:00',
          parkingPlan: 'Parking des Ocres',
          duration: 'Half day + market',
          planB: 'If rain, prioritize market and cafés',
          stops: [
            {
              name: 'Roussillon Ochre Trail',
              address: 'Sentier des Ocres, Roussillon, France',
              parking: 'Parking des Ocres, Roussillon, France',
              arrivalWindow: '09:00–10:30',
              stayMin: 75,
              notes: 'Wear closed shoes; ochre dust stains.'
            }
          ]
        },
        {
          day: 3,
          date: '2026-05-30',
          title: 'Apt Saturday Market + Colorado Provençal',
          arrivalTarget: '08:00',
          parkingPlan: 'Apt market peripheral parking',
          duration: 'Market morning + scenic afternoon',
          planB: 'If market parking is full, shift to Rustrel first',
          stops: [
            {
              name: 'Apt Saturday Market',
              address: 'Place de la Bouquerie, Apt, France',
              parking: 'Parking du Luberon, Apt, France',
              arrivalWindow: '08:00–10:00',
              stayMin: 120,
              notes: 'Priority market day.'
            },
            {
              name: 'Colorado Provençal (Rustrel)',
              address: 'Colorado Provençal, Rustrel, France',
              parking: 'Parking Colorado Provençal, Rustrel, France',
              arrivalWindow: '11:00–13:00',
              stayMin: 90,
              notes: 'Good backup if weather is stable and dry.'
            }
          ]
        },
        {
          day: 4,
          date: '2026-05-31',
          title: 'L’Isle-sur-la-Sorgue Sunday Market',
          arrivalTarget: '08:30',
          parkingPlan: 'Park outside center and walk in',
          duration: 'Full market focus day',
          planB: 'If too crowded, pivot to Fontaine-de-Vaucluse',
          stops: [
            {
              name: 'L’Isle-sur-la-Sorgue Market',
              address: 'Centre-ville, L\'Isle-sur-la-Sorgue, France',
              parking: 'Parking La Rode, L\'Isle-sur-la-Sorgue, France',
              arrivalWindow: '08:30–11:30',
              stayMin: 180,
              notes: 'High-priority Sunday market.'
            },
            {
              name: 'Fontaine-de-Vaucluse',
              address: 'Fontaine-de-Vaucluse, France',
              parking: 'Parking des Vergnes, Fontaine-de-Vaucluse, France',
              arrivalWindow: '12:00–14:00',
              stayMin: 90,
              notes: 'Good decompression stop after market crowds.'
            }
          ]
        },
        {
          day: 5,
          date: '2026-06-01',
          title: 'Flexible Scenic / Recovery Day',
          arrivalTarget: '09:30',
          parkingPlan: 'Use destination parking as needed',
          duration: 'Low-intensity day',
          planB: 'Swap with weather-sensitive day if needed',
          stops: [
            {
              name: 'Ménerbes / Bonnieux loop',
              address: 'Ménerbes, France',
              parking: 'Parking Ménerbes, France',
              arrivalWindow: '09:30–12:00',
              stayMin: 120,
              notes: 'Flexible day to absorb schedule changes.'
            }
          ]
        },
        {
          day: 6,
          date: '2026-06-02',
          title: 'Departure Day (MRS transfer)',
          arrivalTarget: 'Departure dependent',
          parkingPlan: 'Airport return parking / rental drop-off',
          duration: 'Travel day',
          planB: 'Keep this day light to avoid stress',
          stops: [
            {
              name: 'Marseille Provence Airport (MRS)',
              address: 'Marseille Provence Airport, Marignane, France',
              parking: 'PARKING MRS, Marignane, France',
              arrivalWindow: 'Flight minus 2.5–3 hours',
              stayMin: 120,
              notes: 'Buffer for fuel, drop-off, and security.'
            }
          ]
        }
      ]
    };

    let currentDayIndex = 0;
    const STORAGE_KEY = 'provence_market_checks_v1';

    function mapUrl(q) {
      return `https://maps.apple.com/?q=${encodeURIComponent(q)}`;
    }

    function openMaps(q) {
      window.location.href = mapUrl(q);
    }

    function dayName(i) {
      return ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'][i];
    }

    function prettyDate(iso) {
      const d = new Date(iso + 'T12:00:00');
      return d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
    }

    function tripDaysOfWeekSet() {
      const out = new Set();
      const start = new Date(TRIP.startDate + 'T12:00:00');
      const end = new Date(TRIP.endDate + 'T12:00:00');
      for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
        out.add(d.getDay());
      }
      return out;
    }

    function tripDates() {
      const out = [];
      const start = new Date(TRIP.startDate + 'T12:00:00');
      const end = new Date(TRIP.endDate + 'T12:00:00');
      for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
        const iso = d.toISOString().slice(0, 10);
        out.push(iso);
      }
      return out;
    }

    function loadChecks() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      } catch (_) {
        return {};
      }
    }

    function saveCheck(id, checked) {
      const checks = loadChecks();
      checks[id] = checked;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(checks));
    }

    function openNavCurrent() {
      const stop = TRIP.days[currentDayIndex].stops[0];
      openMaps(stop.address);
    }

    function openParkCurrent() {
      const stop = TRIP.days[currentDayIndex].stops[0];
      openMaps(stop.parking || stop.address);
    }

    async function copyText(value) {
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(value);
        } else {
          const ta = document.createElement('textarea');
          ta.value = value;
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          ta.remove();
        }
        alert('Copied');
      } catch (e) {
        alert('Could not copy. Long press and copy manually.');
      }
    }

    function copyCurrentAddress() {
      const stop = TRIP.days[currentDayIndex].stops[0];
      copyText(stop.address);
    }

    function updateTopbar() {
      const day = TRIP.days[currentDayIndex];
      const firstStop = day.stops[0];
      document.getElementById('currentDayLabel').textContent = `Day ${day.day} — ${day.title}`;
      document.getElementById('nextStopLabel').textContent = `Next: ${firstStop.name}`;
    }

    function stopCard(stop) {
      return `
        <article class="stop">
          <h4>${stop.name}</h4>
          <div class="small"><strong>Arrival:</strong> ${stop.arrivalWindow}</div>
          <div class="small"><strong>Stay:</strong> ${stop.stayMin} min</div>
          <div class="small"><strong>Address:</strong> ${stop.address}</div>
          <div class="small"><strong>Parking:</strong> ${stop.parking || 'Use destination parking'}</div>
          <div class="small"><strong>Notes:</strong> ${stop.notes || '-'}</div>
          <div class="row" style="margin-top:8px;">
            <a class="btn-link" href="${mapUrl(stop.address)}">Open</a>
            <a class="btn-link success" href="${mapUrl(stop.parking || stop.address)}">Park</a>
            <button class="secondary js-copy" data-copy="${encodeURIComponent(stop.address || '')}">Copy</button>
          </div>
        </article>
      `;
    }

    function marketCard(market, idx, checks) {
      const id = `mkt_${idx}`;
      const done = !!checks[id];
      const inTrip = tripDaysOfWeekSet().has(market.dayOfWeek);
      return `
        <article class="stop" data-market-day="${market.dayOfWeek}" data-in-trip="${inTrip ? 'yes' : 'no'}">
          <h4>${market.name} ${market.priority === 'must' ? '⭐' : ''}</h4>
          <div class="small"><strong>Town:</strong> ${market.town}</div>
          <div class="small"><strong>Day:</strong> ${dayName(market.dayOfWeek)} ${inTrip ? '• during your trip' : '• outside your dates'}</div>
          <div class="small"><strong>Address:</strong> ${market.address}</div>
          <div class="small"><strong>Notes:</strong> ${market.notes}</div>
          <div class="row" style="margin-top:8px;">
            <a class="btn-link" href="${mapUrl(market.address)}">Open Market</a>
            <button class="secondary js-copy" data-copy="${encodeURIComponent(market.address || '')}">Copy</button>
          </div>
          <label class="small" style="display:flex;align-items:center;gap:8px;margin-top:8px;">
            <input type="checkbox" ${done ? 'checked' : ''} onchange="saveCheck('${id}', this.checked)" />
            Mark as done
          </label>
        </article>
      `;
    }

    function highlightMarketDay(dayIdx) {
      const cards = Array.from(document.querySelectorAll('[data-market-day]'));
      cards.forEach(card => {
        const matches = dayIdx === -1 || Number(card.getAttribute('data-market-day')) === dayIdx;
        card.style.display = matches ? '' : 'none';
      });
    }

    function dayCard(day, idx) {
      return `
        <section class="card" data-day="${idx}">
          <h2>Day ${day.day}: ${day.title}</h2>
          <div class="small"><strong>Date:</strong> ${day.date ? prettyDate(day.date) : 'Set date'}</div>
          <div class="grid2 small">
            <div><strong>Best arrival:</strong> ${day.arrivalTarget}</div>
            <div><strong>Parking plan:</strong> ${day.parkingPlan}</div>
            <div><strong>Duration:</strong> ${day.duration}</div>
            <div><strong>Plan B:</strong> ${day.planB}</div>
          </div>
          ${day.stops.map(stopCard).join('')}
          <details>
            <summary>Operational notes</summary>
            <ul>
              <li>Open file in airplane mode to verify offline behavior.</li>
              <li>Keep maps region downloaded in Apple Maps.</li>
              <li>Use parking button in congested villages.</li>
            </ul>
          </details>
        </section>
      `;
    }

    function infoCards() {
      const checks = loadChecks();
      const mustCount = TRIP.markets.filter(m => m.priority === 'must').length;
      const mustInTripCount = TRIP.markets.filter(m => m.priority === 'must' && tripDaysOfWeekSet().has(m.dayOfWeek)).length;
      const planned = new Set(TRIP.days.map(d => d.date).filter(Boolean));
      const openDates = tripDates().filter(d => !planned.has(d));
      const doneMust = TRIP.markets
        .map((_, i) => `mkt_${i}`)
        .filter((id, i) => TRIP.markets[i].priority === 'must' && checks[id]).length;
      return `
        <section class="card">
          <h3>Must-hit markets tracker</h3>
          <div class="small"><strong>Trip window:</strong> ${prettyDate(TRIP.startDate)} → ${prettyDate(TRIP.endDate)}</div>
          <div class="small"><strong>Market days in window:</strong> ${Array.from(tripDaysOfWeekSet()).map(dayName).join(', ')}</div>
          <div class="small"><strong>Progress:</strong> ${doneMust}/${mustCount} must-hit markets completed</div>
          <div class="small"><strong>Must-hit available this trip:</strong> ${mustInTripCount}/${mustCount}</div>
          <div class="small"><strong>Tip:</strong> This checklist saves on your phone via local storage.</div>
          <div class="small" style="margin-top:8px;">
            <label><strong>Check markets for weekday:</strong>
              <select onchange="highlightMarketDay(Number(this.value))">
                <option value="-1">All days</option>
                <option value="0">Sun</option>
                <option value="1">Mon</option>
                <option value="2">Tue</option>
                <option value="3">Wed</option>
                <option value="4">Thu</option>
                <option value="5">Fri</option>
                <option value="6">Sat</option>
              </select>
            </label>
          </div>
          ${TRIP.markets.map((m, i) => marketCard(m, i, checks)).join('')}
        </section>
        <section class="card">
          <h3>Suggested itinerary coverage</h3>
          <div class="small"><strong>Planned days:</strong> ${TRIP.days.length}</div>
          <div class="small"><strong>Open dates:</strong> ${openDates.length ? openDates.map(prettyDate).join(', ') : 'None'}</div>
          <div class="small"><strong>Note:</strong> Keep open dates for weather swaps and market priorities.</div>
        </section>
        <section class="card">
          <h3>Offline essentials</h3>
          <div class="small"><strong>Lodging:</strong> ${TRIP.lodging.name}</div>
          <div class="small"><strong>Address:</strong> ${TRIP.lodging.address}</div>
          <div class="small"><strong>Phone:</strong> ${TRIP.lodging.phone}</div>
          <div class="small"><strong>Booking ref:</strong> <span class="mono">${TRIP.lodging.bookingRef}</span></div>
          <div class="row" style="margin-top:8px;">
            <a class="btn-link" href="${mapUrl(TRIP.lodging.address)}">Map Lodging</a>
            <button class="secondary js-copy" data-copy="${encodeURIComponent(TRIP.lodging.address || '')}">Copy Lodging</button>
          </div>
        </section>
        <section class="card">
          <h3>Emergency</h3>
          <div class="small"><strong>Emergency number:</strong> ${TRIP.emergency.emergency}</div>
          <div class="small"><strong>Pharmacy:</strong> ${TRIP.emergency.pharmacy}</div>
          <div class="small"><strong>Urgent care:</strong> ${TRIP.emergency.urgentCare}</div>
          <div class="row" style="margin-top:8px;">
            <a class="btn-link warn" href="tel:${TRIP.emergency.emergency}">Call ${TRIP.emergency.emergency}</a>
          </div>
        </section>
      `;
    }

    function render() {
      const app = document.getElementById('app');
      app.innerHTML = infoCards() + TRIP.days.map(dayCard).join('');
      updateTopbar();
    }

    function toggleToday() {
      const dayCards = Array.from(document.querySelectorAll('[data-day]'));
      const allVisible = dayCards.every(el => el.style.display !== 'none');
      dayCards.forEach((el, idx) => {
        el.style.display = allVisible ? (idx === currentDayIndex ? '' : 'none') : '';
      });
    }


    document.addEventListener('click', (e) => {
      const copyBtn = e.target.closest('.js-copy');
      if (!copyBtn) return;
      const value = decodeURIComponent(copyBtn.dataset.copy || '');
      copyText(value);
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') {
        currentDayIndex = (currentDayIndex + 1) % TRIP.days.length;
        updateTopbar();
      }
      if (e.key === 'ArrowLeft') {
        currentDayIndex = (currentDayIndex - 1 + TRIP.days.length) % TRIP.days.length;
        updateTopbar();
      }
    });

    render();
  </script>
</body>
</html>
